    <text x="186" y="0" fill="#A7B6AB" font-size="18" font-family="Manrope, Arial, sans-serif" font-weight="700" letter-spacing="4">VIDEO EDITOR</text>

    <text x="0" y="140" fill="#F4F7F2" font-size="92" font-family="Syne, Arial, sans-serif" font-weight="800">Edicao que faz</text>
    <text x="0" y="246" fill="#74f289" font-size="92" font-family="Syne, Arial, sans-serif" font-weight="800">o conteudo respirar</text>
    <text x="0" y="352" fill="#F4F7F2" font-size="92" font-family="Syne, Arial, sans-serif" font-weight="800">e vender melhor</text>

    <text x="0" y="432" fill="#A7B6AB" font-size="28" font-family="Manrope, Arial, sans-serif">
