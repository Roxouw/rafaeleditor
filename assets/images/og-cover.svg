<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Rafael Editor Open Graph Cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091311"/>
      <stop offset="100%" stop-color="#040a09"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="0" cy="0" r="1" gradientTransform="translate(180 120) rotate(35) scale(520 320)">
      <stop offset="0%" stop-color="#74f289" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#74f289" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="0" cy="0" r="1" gradientTransform="translate(1040 470) rotate(25) scale(340 240)">
      <stop offset="0%" stop-color="#74f289" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#74f289" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13231f"/>
      <stop offset="100%" stop-color="#0a1513"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9af8a9"/>
      <stop offset="100%" stop-color="#74f289"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-left)"/>
  <rect width="1200" height="630" fill="url(#glow-right)"/>

  <g opacity=".18">
    <path d="M0 116H1200" stroke="#74f289" stroke-width="1"/>
    <path d="M0 516H1200" stroke="#74f289" stroke-width="1"/>
    <path d="M132 0V630" stroke="#74f289" stroke-width="1"/>
    <path d="M808 0V630" stroke="#74f289" stroke-width="1"/>
  </g>

  <g transform="translate(82 84)">
    <text x="0" y="0" fill="#F4F7F2" font-size="34" font-family="Manrope, Arial, sans-serif" font-weight="700">Rafael<tspan fill="#74f289">.</tspan></text>
    <text x="188" y="0" fill="#A7B6AB" font-size="18" font-family="Manrope, Arial, sans-serif" font-weight="700" letter-spacing="4">VIDEO EDITOR</text>

    <rect x="0" y="56" width="258" height="42" rx="21" fill="rgba(116,242,137,.08)" stroke="rgba(116,242,137,.2)"/>
    <circle cx="28" cy="77" r="8" fill="url(#accent)"/>
    <text x="48" y="84" fill="#D7E8DA" font-size="18" font-family="Manrope, Arial, sans-serif" font-weight="800" letter-spacing="2">PORTFOLIO QUE FECHA CLIENTE</text>

    <text x="0" y="188" fill="#F4F7F2" font-size="90" font-family="Syne, Arial, sans-serif" font-weight="800">Edicao com direcao</text>
    <text x="0" y="286" fill="#74f289" font-size="90" font-family="Syne, Arial, sans-serif" font-weight="800">para vender melhor</text>
    <text x="0" y="384" fill="#F4F7F2" font-size="90" font-family="Syne, Arial, sans-serif" font-weight="800">o seu conteudo</text>

    <text x="0" y="462" fill="#A7B6AB" font-size="28" font-family="Manrope, Arial, sans-serif">
      Reels, shorts, VSL e cortes com mais retencao,
    </text>
    <text x="0" y="500" fill="#A7B6AB" font-size="28" font-family="Manrope, Arial, sans-serif">
      clareza de mensagem e valor percebido para sua marca.
    </text>
  </g>

  <g transform="translate(842 96)">
    <rect width="286" height="434" rx="34" fill="url(#panel)" stroke="rgba(255,255,255,.08)"/>

    <rect x="22" y="22" width="242" height="54" rx="27" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.06)"/>
    <text x="44" y="56" fill="#A7B6AB" font-size="18" font-family="Manrope, Arial, sans-serif" font-weight="800" letter-spacing="2">ENTRADA DE CLIENTE</text>

    <rect x="22" y="100" width="242" height="136" rx="26" fill="rgba(116,242,137,.08)" stroke="rgba(255,255,255,.06)"/>
    <text x="44" y="142" fill="#74f289" font-size="18" font-family="Manrope, Arial, sans-serif" font-weight="800" letter-spacing="2">RETENCAO MEDIA</text>
    <text x="44" y="204" fill="#F4F7F2" font-size="68" font-family="Syne, Arial, sans-serif" font-weight="800">72%</text>
    <text x="162" y="203" fill="#A7B6AB" font-size="22" font-family="Manrope, Arial, sans-serif">mais leitura</text>

    <rect x="22" y="258" width="242" height="66" rx="22" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.06)"/>
    <text x="42" y="300" fill="#F4F7F2" font-size="22" font-family="Manrope, Arial, sans-serif" font-weight="700">Hook forte</text>
    <circle cx="228" cy="291" r="16" fill="rgba(116,242,137,.12)"/>
    <circle cx="228" cy="291" r="6" fill="url(#accent)"/>

    <rect x="22" y="340" width="242" height="66" rx="22" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.06)"/>
    <text x="42" y="382" fill="#F4F7F2" font-size="22" font-family="Manrope, Arial, sans-serif" font-weight="700">Legenda limpa</text>
    <circle cx="228" cy="373" r="16" fill="rgba(116,242,137,.12)"/>
    <circle cx="228" cy="373" r="6" fill="url(#accent)"/>

    <rect x="22" y="422" width="242" height="66" rx="22" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.06)"/>
    <text x="42" y="464" fill="#F4F7F2" font-size="22" font-family="Manrope, Arial, sans-serif" font-weight="700">Conversao visual</text>
    <circle cx="228" cy="455" r="16" fill="rgba(116,242,137,.12)"/>
    <circle cx="228" cy="455" r="6" fill="url(#accent)"/>
