    <rect width="308" height="366" rx="34" fill="rgba(16,31,27,.9)" stroke="rgba(255,255,255,.1)"/>
    <rect x="20" y="20" width="268" height="54" rx="27" fill="rgba(7,17,15,.7)" stroke="rgba(255,255,255,.08)"/>
